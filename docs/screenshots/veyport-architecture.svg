<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Veyport architecture</title>
  <desc id="desc">Veyport hub-and-spoke architecture with browser access, optional reverse proxy, LDAP identity, SQLite storage, and outbound mTLS agent streams for files, logs, uploads, terminal sessions, and certificate renewal.</desc>
  <defs>
    <linearGradient id="hubGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10213c"/>
      <stop offset="1" stop-color="#245b8e"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f6fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#16324f"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#2b6cb0"/>
    </marker>
    <style>
      text { font-family: "DejaVu Sans", Arial, sans-serif; }
      .title { font-size: 52px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 24px; font-weight: 500; fill: #475569; }
      .box-title { font-size: 26px; font-weight: 700; fill: #10233f; }
      .box-body { font-size: 19px; font-weight: 500; fill: #334155; }
      .box-small { font-size: 16px; font-weight: 500; fill: #475569; }
      .hub-title { font-size: 34px; font-weight: 700; fill: #f8fafc; }
      .hub-body { font-size: 18px; font-weight: 500; fill: #d9e8f7; }
      .hub-chip { font-size: 17px; font-weight: 700; fill: #f8fafc; }
      .flow { font-size: 19px; font-weight: 700; fill: #17324f; }
      .flow-small { font-size: 16px; font-weight: 600; fill: #2b5f93; }
      .line { stroke: #16324f; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .line-both { stroke: #16324f; stroke-width: 5; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .line-blue { stroke: #2b6cb0; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .dashed { stroke-dasharray: 12 12; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="#f8fafc"/>
  <path d="M 90 885 C 320 820, 468 944, 680 875 S 1030 808, 1230 882 S 1510 964, 1710 870" fill="none" stroke="#e2e8f0" stroke-width="30" opacity="0.8"/>

  <text x="900" y="76" text-anchor="middle" class="title">Veyport Architecture</text>
  <text x="900" y="116" text-anchor="middle" class="subtitle">One self-hosted Hub, browser access, and outbound agents for files, logs, uploads, and terminal sessions</text>

  <g filter="url(#shadow)">
    <rect x="76" y="412" width="270" height="205" rx="14" fill="url(#cardGradient)" stroke="#c9d4e2" stroke-width="2"/>
    <rect x="124" y="454" width="154" height="94" rx="8" fill="#f8fbff" stroke="#26384f" stroke-width="7"/>
    <path d="M 151 501 C 184 462, 238 462, 271 501 C 238 540, 184 540, 151 501 Z" fill="none" stroke="#2b6cb0" stroke-width="6"/>
    <circle cx="211" cy="501" r="11" fill="#2b6cb0"/>
    <rect x="111" y="560" width="200" height="12" rx="6" fill="#34495f"/>
    <path d="M 96 588 H 326 L 305 607 H 117 Z" fill="#52657b"/>
    <text x="211" y="662" text-anchor="middle" class="box-title">Browser</text>
    <text x="211" y="692" text-anchor="middle" class="box-body">React SPA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="400" width="292" height="220" rx="14" fill="url(#cardGradient)" stroke="#c9d4e2" stroke-width="2"/>
    <path d="M 576 438 L 650 470 L 638 548 C 632 586, 603 613, 576 627 C 549 613, 520 586, 514 548 L 502 470 Z" fill="#235f98" stroke="#17324f" stroke-width="3"/>
    <path d="M 576 466 V 595 M 536 533 L 576 466 L 616 533" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="576" y="676" text-anchor="middle" class="box-title">Reverse Proxy</text>
    <text x="576" y="706" text-anchor="middle" class="box-body">optional TLS edge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="154" width="460" height="112" rx="14" fill="#ffffff" stroke="#c9d4e2" stroke-width="2"/>
    <circle cx="836" cy="210" r="30" fill="#e7f2ff" stroke="#2b6cb0" stroke-width="4"/>
    <circle cx="836" cy="201" r="9" fill="#2b6cb0"/>
    <path d="M 810 233 C 818 218, 854 218, 862 233" fill="none" stroke="#2b6cb0" stroke-width="6" stroke-linecap="round"/>
    <text x="894" y="202" class="box-title">LDAP / FreeIPA</text>
    <text x="894" y="232" class="box-body">bind auth and group mapping</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="332" width="500" height="500" rx="16" fill="#ffffff" stroke="#c9d4e2" stroke-width="2"/>
    <rect x="772" y="344" width="476" height="476" rx="11" fill="url(#hubGradient)"/>
    <path d="M 820 392 L 872 418 L 872 474 L 820 500 L 768 474 L 768 418 Z" fill="#10233f" stroke="#8dc5f5" stroke-width="3"/>
    <path d="M 790 451 L 820 410 L 850 451 M 820 410 V 482" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="910" y="424" class="hub-title">Veyport Hub</text>
    <text x="910" y="456" class="hub-body">Go server with embedded web UI</text>

    <rect x="810" y="525" width="400" height="62" rx="10" fill="#ffffff" opacity="0.13"/>
    <text x="836" y="553" class="hub-chip">Web UI, REST API, SSE</text>
    <text x="836" y="578" class="hub-body">fleet, files, logs, terminal streams</text>

    <rect x="810" y="614" width="400" height="62" rx="10" fill="#ffffff" opacity="0.13"/>
    <text x="836" y="642" class="hub-chip">Auth and access control</text>
    <text x="836" y="667" class="hub-body">local/LDAP, TOTP, RBAC, path gates</text>

    <rect x="810" y="703" width="400" height="62" rx="10" fill="#ffffff" opacity="0.13"/>
    <text x="836" y="731" class="hub-chip">Agent operation broker</text>
    <text x="836" y="756" class="hub-body">file browser, log tail, upload, PTY</text>

    <ellipse cx="858" cy="778" rx="46" ry="14" fill="#f8fafc"/>
    <path d="M 812 778 V 802 C 812 811, 833 818, 858 818 C 883 818, 904 811, 904 802 V 778" fill="#e8f1fb" stroke="#d7e7f8" stroke-width="2"/>
    <text x="940" y="785" class="hub-chip">SQLite</text>
    <text x="940" y="810" class="hub-body">users, servers, permissions, audit</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1420" y="250" width="330" height="145" rx="14" fill="url(#cardGradient)" stroke="#c9d4e2" stroke-width="2"/>
    <rect x="1462" y="290" width="78" height="62" rx="6" fill="#4b5d70" stroke="#26384f" stroke-width="3"/>
    <rect x="1477" y="303" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="303" width="21" height="9" fill="#9fb3c8"/>
    <rect x="1477" y="332" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="332" width="21" height="9" fill="#9fb3c8"/>
    <text x="1572" y="304" class="box-title">Agent</text>
    <text x="1572" y="334" class="box-body">Server 1</text>
    <text x="1572" y="363" class="box-small">PTY, files, logs, uploads</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1420" y="478" width="330" height="145" rx="14" fill="url(#cardGradient)" stroke="#c9d4e2" stroke-width="2"/>
    <rect x="1462" y="518" width="78" height="62" rx="6" fill="#4b5d70" stroke="#26384f" stroke-width="3"/>
    <rect x="1477" y="531" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="531" width="21" height="9" fill="#9fb3c8"/>
    <rect x="1477" y="560" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="560" width="21" height="9" fill="#9fb3c8"/>
    <text x="1572" y="532" class="box-title">Agent</text>
    <text x="1572" y="562" class="box-body">Server 2</text>
    <text x="1572" y="591" class="box-small">outbound connection only</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1420" y="706" width="330" height="145" rx="14" fill="url(#cardGradient)" stroke="#c9d4e2" stroke-width="2"/>
    <rect x="1462" y="746" width="78" height="62" rx="6" fill="#4b5d70" stroke="#26384f" stroke-width="3"/>
    <rect x="1477" y="759" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="759" width="21" height="9" fill="#9fb3c8"/>
    <rect x="1477" y="788" width="15" height="11" fill="#9fb3c8"/>
    <rect x="1510" y="788" width="21" height="9" fill="#9fb3c8"/>
    <text x="1572" y="760" class="box-title">Agent</text>
    <text x="1572" y="790" class="box-body">Server N</text>
    <text x="1572" y="819" class="box-small">no inbound mgmt port</text>
  </g>

  <path d="M 346 514 H 430" class="line"/>
  <text x="388" y="488" text-anchor="middle" class="flow">HTTPS</text>
  <text x="388" y="512" text-anchor="middle" class="flow-small">443</text>

  <path d="M 722 514 H 760" class="line"/>
  <text x="741" y="475" text-anchor="middle" class="flow">HTTP(S)</text>
  <text x="741" y="500" text-anchor="middle" class="flow-small">REST + SSE :8081</text>

  <path d="M 1010 266 V 332" class="line-blue"/>
  <text x="1033" y="302" class="flow-small">identity lookup</text>

  <path d="M 1260 322 H 1420" class="line-both"/>
  <path d="M 1260 550 H 1420" class="line-both"/>
  <path d="M 1260 778 H 1420" class="line-both"/>
  <text x="1340" y="193" text-anchor="middle" class="flow">gRPC mTLS stream</text>
  <text x="1340" y="218" text-anchor="middle" class="flow-small">:9090, agents dial out</text>
  <text x="1340" y="243" text-anchor="middle" class="flow-small">certificates renew in-stream</text>

  <path d="M 300 618 C 430 780, 602 862, 760 758" class="line dashed"/>
  <text x="535" y="856" text-anchor="middle" class="box-small">direct browser-to-Hub access is also supported</text>

  <g filter="url(#shadow)">
    <rect x="250" y="924" width="1300" height="112" rx="16" fill="#ffffff" stroke="#c9d4e2" stroke-width="2"/>
    <text x="900" y="966" text-anchor="middle" class="box-title">Security boundary</text>
    <text x="900" y="998" text-anchor="middle" class="box-body">The Hub enforces TOTP, RBAC, LDAP terminal eligibility, per-server/path permissions, and immutable audit logging.</text>
    <text x="900" y="1027" text-anchor="middle" class="box-body">Agents dial out over mTLS; managed hosts do not expose inbound Veyport management ports.</text>
  </g>
</svg>
