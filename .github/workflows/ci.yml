name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Frontend tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html

      - name: Hub tests with coverage
        run: cd hub && go test ./internal/... -coverprofile=../coverage-hub.out -covermode=atomic

      - name: Hub command tests with coverage
        run: cd hub && go test ./cmd/aerodocs -coverprofile=../coverage-hub-cmd.out -covermode=atomic

      - name: Agent tests with coverage
        run: cd agent && go test ./... -coverprofile=../coverage-agent.out -covermode=atomic

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage-hub.out
            coverage-hub-cmd.out
            coverage-agent.out
            web/coverage/lcov.info

  integration:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum
      - name: Integration tests with coverage
        run: cd hub && go test ./internal/integration/ -v -timeout 120s -coverprofile=../coverage-integration.out -covermode=atomic -coverpkg=./internal/...

      - name: Report agent binary coverage
        if: always()
        run: |
          if [ -f coverage-agent-integration.out ]; then
            echo "=== Agent Binary Integration Coverage ==="
            cd agent && go tool cover -func=../coverage-agent-integration.out | tail -1
          else
            echo "No agent binary coverage file found"
          fi

      - name: Upload integration coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: |
            coverage-integration.out
            coverage-agent-integration.out

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run smoke tests
        run: bash tests/smoke/smoke_test.sh
        env:
          BUILD_ARGS: "--build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26.2-bookworm"

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Build Docker image
        run: docker build --build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26.2-bookworm -t aerodocs-e2e:test .

      - name: Run E2E tests
        run: cd tests/e2e && E2E_IMAGE=aerodocs-e2e:test npx playwright test

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/test-results/

  sonarcloud:
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: coverage

      - uses: actions/download-artifact@v8
        with:
          name: coverage-integration

      - uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Semgrep SAST scan
        run: |
          echo "### Semgrep SAST Scan" >> "$GITHUB_STEP_SUMMARY"
          semgrep scan --config p/golang --config p/typescript --config p/owasp-top-ten --sarif -o semgrep.sarif . 2>&1 | tee semgrep-output.txt || true
          if [ -f semgrep.sarif ]; then
            FINDINGS=$(python3 -c "import sys,json; d=json.load(open('semgrep.sarif')); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "unknown")
            echo "Findings: **${FINDINGS}**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 semgrep-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=v8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks secret scan
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: gitleaks git . --report-format sarif --report-path gitleaks-results.sarif --exit-code 1

      - name: Upload Gitleaks artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif

  vulnerability-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html

      - name: govulncheck (Hub)
        run: |
          echo "### govulncheck - Hub" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd hub && govulncheck ./... 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: govulncheck (Agent)
        run: |
          echo "### govulncheck - Agent" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd agent && govulncheck ./... 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: npm audit (Frontend)
        run: |
          echo "### npm audit - Frontend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd web && npm ci --ignore-scripts && npm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  auto-release:
    needs: [integration, smoke, e2e, sonarcloud, sast, secret-scan, vulnerability-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    concurrency:
      group: auto-release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next patch release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          if existing_tag="$(git describe --exact-match --tags --match 'v[0-9]*.[0-9]*.[0-9]*' HEAD 2>/dev/null)"; then
            echo "HEAD is already tagged as ${existing_tag}; skipping auto-release."
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "${latest_tag}" ]; then
            echo "No existing vMAJOR.MINOR.PATCH release tag found." >&2
            exit 1
          fi

          if [[ ! "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest release tag ${latest_tag} is not a vMAJOR.MINOR.PATCH tag." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          if git ls-remote --exit-code --tags origin "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "Release tag ${next_tag} already exists on origin." >&2
            exit 1
          fi

          git tag -a "${next_tag}" -m "${next_tag}"
          git push origin "refs/tags/${next_tag}"
          gh workflow run release.yml --ref "${next_tag}"

          {
            echo "### Auto Release"
            echo "Created release tag **${next_tag}** from \`${GITHUB_SHA}\`."
            echo "Dispatched the Release workflow for **${next_tag}** to publish Docker artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
