name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Frontend tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Hub tests with coverage
        run: cd hub && go test ./internal/... -coverprofile=../coverage-hub.out -covermode=atomic

      - name: Agent tests with coverage
        run: cd agent && go test ./... -coverprofile=../coverage-agent.out -covermode=atomic

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage-hub.out
            coverage-agent.out
            web/coverage/lcov.info

  integration:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum
      - name: Integration tests with coverage
        run: cd hub && go test ./internal/integration/ -v -timeout 120s -coverprofile=../coverage-integration.out -covermode=atomic -coverpkg=./internal/...

      - name: Report agent binary coverage
        if: always()
        run: |
          if [ -f coverage-agent-integration.out ]; then
            echo "=== Agent Binary Integration Coverage ==="
            cd agent && go tool cover -func=../coverage-agent-integration.out | tail -1
          else
            echo "No agent binary coverage file found"
          fi

      - name: Upload integration coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: |
            coverage-integration.out
            coverage-agent-integration.out

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run smoke tests
        run: bash tests/smoke/smoke_test.sh
        env:
          BUILD_ARGS: "--build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26-bookworm"

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Build Docker image
        run: docker build --build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26-bookworm -t aerodocs-e2e:test .

      - name: Run E2E tests
        run: cd tests/e2e && E2E_IMAGE=aerodocs-e2e:test npx playwright test

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/test-results/

  sonarcloud:
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: coverage

      - uses: actions/download-artifact@v8
        with:
          name: coverage-integration

      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/typescript
            p/owasp-top-ten

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  vulnerability-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html

      - name: govulncheck (Hub)
        run: |
          echo "### govulncheck - Hub" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd hub && govulncheck ./... 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: govulncheck (Agent)
        run: |
          echo "### govulncheck - Agent" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd agent && govulncheck ./... 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: npm audit (Frontend)
        run: |
          echo "### npm audit - Frontend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cd web && npm ci --ignore-scripts && npm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
