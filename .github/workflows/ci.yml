name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Frontend tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Hub tests with coverage
        run: cd hub && go test ./internal/... -coverprofile=../coverage-hub.out -covermode=atomic

      - name: Agent tests with coverage
        run: cd agent && go test ./... -coverprofile=../coverage-agent.out -covermode=atomic

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage-hub.out
            coverage-agent.out
            web/coverage/lcov.info

  integration:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum
      - name: Integration tests with coverage
        run: cd hub && go test ./internal/integration/ -v -timeout 120s -coverprofile=../coverage-integration.out -covermode=atomic -coverpkg=./internal/...

      - name: Report agent binary coverage
        if: always()
        run: |
          if [ -f coverage-agent-integration.out ]; then
            echo "=== Agent Binary Integration Coverage ==="
            cd agent && go tool cover -func=../coverage-agent-integration.out | tail -1
          else
            echo "No agent binary coverage file found"
          fi

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: |
            coverage-integration.out
            coverage-agent-integration.out

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash tests/smoke/smoke_test.sh
        env:
          BUILD_ARGS: "--build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26-bookworm"

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Build Docker image
        run: docker build --build-arg NODE_IMAGE=node:25-slim --build-arg GO_IMAGE=golang:1.26-bookworm -t aerodocs-e2e:test .

      - name: Run E2E tests
        run: cd tests/e2e && E2E_IMAGE=aerodocs-e2e:test npx playwright test

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/test-results/

  sonarcloud:
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  vulnerability-scan:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html

      - name: govulncheck (Hub)
        run: cd hub && govulncheck -format sarif ./... > ../govulncheck-hub.sarif 2>&1 || true

      - name: govulncheck (Agent)
        run: cd agent && govulncheck -format sarif ./... > ../govulncheck-agent.sarif 2>&1 || true

      - name: Upload govulncheck results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: govulncheck-hub.sarif
          category: govulncheck-hub

      - name: Upload agent govulncheck results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: govulncheck-agent.sarif
          category: govulncheck-agent

      - name: npm audit (Frontend)
        run: cd web && npm ci && npm audit --audit-level=high || true
