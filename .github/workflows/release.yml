name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum
      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html
      - name: Hub tests
        run: cd hub && go test ./internal/...
      - name: Agent tests
        run: cd agent && go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: "yiucloud/aerodocs-builder"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: yiucloud/aerodocs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          sbom: true
          provenance: mode=max

  scan-container:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1.20.3
        with:
          command: cves
          image: yiucloud/aerodocs:${{ env.IMAGE_TAG }}
          summary: true
          write-comment: false

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | \
            sh -s -- -b /usr/local/bin v0.110.0

      - name: Grype container scan
        run: |
          grype "yiucloud/aerodocs:${IMAGE_TAG}" -o json > grype-results.json || true
          grype "yiucloud/aerodocs:${IMAGE_TAG}" -o table > grype-results.txt || true
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          results = json.loads(Path("grype-results.json").read_text())
          matches = results.get("matches", [])
          high_or_critical = [
              m for m in matches
              if m.get("vulnerability", {}).get("severity") in {"High", "Critical"}
          ]

          lines = [
              "### Grype Container Scan",
              f"Total findings: **{len(matches)}**",
              f"High/Critical findings: **{len(high_or_critical)}**",
              "",
          ]

          if high_or_critical:
              lines.extend([
                  "| Package | Installed | Vulnerability | Severity |",
                  "| --- | --- | --- | --- |",
              ])
              for match in high_or_critical[:10]:
                  artifact = match.get("artifact", {})
                  vuln = match.get("vulnerability", {})
                  lines.append(
                      f"| {artifact.get('name', '')} | {artifact.get('version', '')} | "
                      f"{vuln.get('id', '')} | {vuln.get('severity', '')} |"
                  )
          else:
              lines.append("No high or critical findings detected by Grype.")

          summary_path.write_text("\\n".join(lines) + "\\n")
          PY

      - name: Upload Grype artifacts
        uses: actions/upload-artifact@v7
        with:
          name: grype-results
          path: |
            grype-results.json
            grype-results.txt

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
            sh -s -- -b /usr/local/bin v1.42.3

      - name: Generate SBOM with Syft
        run: syft scan "yiucloud/aerodocs:${IMAGE_TAG}" -o spdx-json=sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  malware-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "yiucloud/aerodocs:$IMAGE_TAG"

      - name: Export image filesystem
        run: |
          docker create --name aerodocs-scan "yiucloud/aerodocs:$IMAGE_TAG"
          docker export aerodocs-scan -o image-fs.tar
          docker rm aerodocs-scan

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo freshclam

      - name: Run ClamAV scan
        run: clamscan --infected --recursive image-fs.tar

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$GITHUB_REF_NAME$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PREV_TAG: ${{ steps.notes.outputs.prev_tag }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            gh release create "$GITHUB_REF_NAME" --generate-notes --notes-start-tag "$PREV_TAG"
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
