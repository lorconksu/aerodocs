name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: hub/go.mod
          cache-dependency-path: |
            hub/go.sum
            agent/go.sum
      - name: Create frontend embed stub
        run: mkdir -p hub/web/dist && touch hub/web/dist/index.html
      - name: Hub tests
        run: cd hub && go test ./internal/...
      - name: Agent tests
        run: cd agent && go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "yiucloud/aerodocs-builder"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yiucloud/aerodocs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          sbom: true
          provenance: mode=max

  scan-container:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: yiucloud/aerodocs:${{ github.ref_name }}
          summary: true

      - name: Docker Scout quickview
        continue-on-error: true  # quickview may fail on non-Debian bases (e.g. Wolfi)
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: yiucloud/aerodocs:${{ github.ref_name }}

      - name: Grype container scan
        uses: anchore/scan-action@v6
        with:
          image: yiucloud/aerodocs:${{ github.ref_name }}
          fail-build: false
          severity-cutoff: high
          output-format: table

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: yiucloud/aerodocs:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  malware-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull yiucloud/aerodocs:${{ github.ref_name }}

      - name: Export image filesystem
        run: |
          docker create --name aerodocs-scan yiucloud/aerodocs:${{ github.ref_name }}
          docker export aerodocs-scan -o image-fs.tar
          docker rm aerodocs-scan

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav
          sudo freshclam

      - name: Run ClamAV scan
        run: clamscan --infected --recursive image-fs.tar
