name: Docker Vulnerability Badge

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: docker-vuln-badge
  cancel-in-progress: false

jobs:
  update-badge:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | \
            sh -s -- -b /usr/local/bin v0.110.0

      - name: Scan published Docker image
        run: |
          set +e
          grype "yiucloud/aerodocs:latest" -o json > grype-results.json
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Grype scan failed with exit code $status"
            rm -f grype-results.json
          fi

      - name: Generate badge payload
        run: |
          python3 scripts/generate_docker_vuln_badge.py \
            --input grype-results.json \
            --output docs/badges/docker-vulns.json \
            --image yiucloud/aerodocs:latest

      - name: Commit badge update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/badges/docker-vulns.json
          if git diff --cached --quiet; then
            echo "No badge changes to commit"
            exit 0
          fi
          git commit -m "docs: update docker vulnerability badge [skip ci]"
          git push
