name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - 'docs/wiki/screenshots/**'
      - 'docs/screenshots/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout wiki
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync wiki content
        run: |
          # Copy wiki pages
          cp docs/wiki/*.md wiki/

          # Copy screenshots referenced by wiki pages
          mkdir -p wiki/screenshots
          cp docs/wiki/screenshots/*.png wiki/screenshots/ 2>/dev/null || true
          cp docs/screenshots/*.png wiki/screenshots/ 2>/dev/null || true

          # Fix image paths in wiki pages (../screenshots/ -> screenshots/)
          cd wiki
          sed -i 's|\.\./screenshots/|screenshots/|g' *.md

      - name: Push to wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync wiki from docs/wiki/"
            git push
          fi
