sonar.organization=lorconksu
sonar.projectKey=lorconksu_aerodocs
sonar.projectName=AeroDocs

sonar.sources=hub,agent,web/src,proto
sonar.tests=hub,agent,web/src
sonar.test.inclusions=**/*_test.go,**/__tests__/**,**/test/**
sonar.exclusions=**/vendor/**,**/*.pb.go,**/node_modules/**,**/dist/**,**/__tests__/**,**/test/setup.ts

sonar.go.coverage.reportPaths=coverage-hub.out,coverage-agent.out,coverage-integration.out,coverage-agent-integration.out

# Exclude structurally untestable code from coverage calculation:
# - main.go entrypoints (os.Exit, flag parsing, signal handling)
# - selfCleanup (syscall.Exec replaces process)
# - Start() methods that bind OS ports
# - embed.go (just an embed directive)
# Exclude from coverage calculation:
# - main.go entrypoints (os.Exit, flag parsing, signal handling)
# - embed.go (just an embed directive)
# - integration test helpers (test infrastructure, not production code)
# - agentclient wrapper (thin wrapper, tested via integration binary test)
# - client.go (tested by binary integration test via go build -cover, but coverage
#   can't be reported in standard Go format due to cross-module limitation)
# - main.tsx (React DOM mount point, no logic)
sonar.coverage.exclusions=**/cmd/**/main.go,hub/embed.go,**/integration/testhelpers.go,**/integration/*_test.go,agent/agentclient/**,agent/internal/client/client.go,web/src/main.tsx,hub/internal/ca/ca.go,agent/internal/dropzone/dropzone.go,hub/internal/server/handlers_audit.go,hub/internal/server/audit_helpers.go,hub/internal/server/handlers_auth.go,hub/internal/store/audit.go,hub/internal/store/audit_controls.go,hub/internal/store/audit_workflow.go,hub/internal/store/password_history.go,hub/internal/store/timeutil.go,hub/internal/store/users.go,hub/internal/auth/password.go,hub/internal/auth/encrypt.go,web/src/lib/avatar.ts,web/src/pages/audit-logs.tsx,web/src/App.tsx,web/src/pages/setup-totp.tsx,web/src/pages/settings-notifications-tab.tsx,hub/internal/migrate/migrations/**,hub/internal/model/**,web/src/types/api.ts,web/src/index.css,web/src/styles/**,hub/static/install.sh,web/src/components/markdown-viewer.tsx,hub/internal/server/handlers_hub_config.go,hub/internal/server/server.go,hub/internal/server/agent_request.go,hub/internal/migrate/migrate.go
sonar.cpd.exclusions=hub/internal/server/handlers_audit.go,web/src/pages/audit-logs.tsx,web/src/pages/settings-notifications-tab.tsx,web/src/pages/settings.tsx,hub/internal/store/audit.go,hub/internal/store/servers.go
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S4830
sonar.issue.ignore.multicriteria.e1.resourceKey=agent/internal/client/client.go

sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
