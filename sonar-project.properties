sonar.organization=lorconksu
sonar.projectKey=lorconksu_aerodocs
sonar.projectName=AeroDocs

sonar.sources=hub,agent,web/src,proto
sonar.tests=hub,agent,web/src
sonar.test.inclusions=**/*_test.go,**/__tests__/**,**/test/**
sonar.exclusions=**/vendor/**,**/*.pb.go,**/node_modules/**,**/dist/**,**/__tests__/**,**/test/setup.ts

sonar.go.coverage.reportPaths=coverage-hub.out,coverage-agent.out,coverage-integration.out

# Exclude structurally untestable code from coverage calculation:
# - main.go entrypoints (os.Exit, flag parsing, signal handling)
# - selfCleanup (syscall.Exec replaces process)
# - Start() methods that bind OS ports
# - embed.go (just an embed directive)
sonar.coverage.exclusions=**/cmd/**/main.go,hub/embed.go

sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
