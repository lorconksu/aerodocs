syntax = "proto3";
package aerodocs.v1;
option go_package = "github.com/wyiu/aerodocs/proto/aerodocs/v1";

service AgentService {
  // Bidirectional stream — agent connects, Hub sends commands, agent responds
  rpc Connect(stream AgentMessage) returns (stream HubMessage);
}

// Messages from Agent → Hub
message AgentMessage {
  oneof payload {
    Heartbeat heartbeat = 1;
    RegisterAgent register = 2;
    // Stubs for sub-projects 4-6
    FileListResponse file_list_response = 10;
    LogStreamChunk log_stream_chunk = 11;
    FileUploadAck file_upload_ack = 12;
    FileReadResponse file_read_response = 13;
    FileDeleteResponse file_delete_response = 15;
    UnregisterAck unregister_ack = 16;
    CertRenewRequest cert_renew_request = 17;
  }
}

// Messages from Hub → Agent
message HubMessage {
  oneof payload {
    HeartbeatAck heartbeat_ack = 1;
    RegisterAck register_ack = 2;
    // Stubs for sub-projects 4-6
    FileListRequest file_list_request = 10;
    LogStreamRequest log_stream_request = 11;
    FileUploadRequest file_upload_request = 12;
    FileReadRequest file_read_request = 13;
    LogStreamStop log_stream_stop = 14;
    FileDeleteRequest file_delete_request = 15;
    UnregisterRequest unregister_request = 16;
    CertRenewResponse cert_renew_response = 17;
  }
}

message Heartbeat {
  string server_id = 1;
  int64 timestamp = 2;
  SystemInfo system_info = 3;
}

message HeartbeatAck {
  int64 timestamp = 1;
}

message RegisterAgent {
  string token = 1;
  string hostname = 2;
  string ip_address = 3;
  string os = 4;
  string agent_version = 5;
  bytes csr = 6;
}

message RegisterAck {
  bool success = 1;
  string server_id = 2;
  string error = 3;
  bytes client_cert = 4;
  bytes ca_cert = 5;
}

message SystemInfo {
  double cpu_percent = 1;
  double memory_percent = 2;
  double disk_percent = 3;
  int64 uptime_seconds = 4;
}

// File browsing (sub-project 4)
message FileListRequest {
  string request_id = 1;
  string path = 2;
}

message FileListResponse {
  string request_id = 1;
  repeated FileNode files = 2;
  string error = 3;
}

message FileNode {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  int64 size = 4;
  bool readable = 5;
}

message FileReadRequest {
  string request_id = 1;
  string path = 2;
  int64 offset = 3;
  int64 limit = 4;
}

message FileReadResponse {
  string request_id = 1;
  bytes data = 2;
  int64 total_size = 3;
  string mime_type = 4;
  string error = 5;
}

// Log tailing (sub-project 5)
message LogStreamRequest {
  string request_id = 1;
  string path = 2;
  int64 offset = 3;
  string grep = 4;
}

message LogStreamChunk {
  string request_id = 1;
  bytes data = 2;
  int64 offset = 3;
}

message LogStreamStop {
  string request_id = 1;
}

// File upload / Dropzone (sub-project 6)
message FileUploadRequest {
  string request_id = 1;
  string filename = 2;
  bytes chunk = 3;
  bool done = 4;
}

message FileUploadAck {
  string request_id = 1;
  bool success = 2;
  string error = 3;
}

// File deletion (dropzone)
message FileDeleteRequest {
  string request_id = 1;
  string path = 2;
}

message FileDeleteResponse {
  string request_id = 1;
  bool success = 2;
  string error = 3;
}

// Server unregistration
message UnregisterRequest {
  string request_id = 1;
}

message UnregisterAck {
  string request_id = 1;
  bool success = 2;
  string error = 3;
}

// Certificate renewal (mTLS)
message CertRenewRequest {
  bytes csr = 1;
}

message CertRenewResponse {
  bytes client_cert = 1;
  bytes ca_cert = 2;
  string error = 3;
}
